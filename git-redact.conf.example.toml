pattern = '\\Users\\johnd'
action = "report"

# ──────────────────────────────────────────────────────────────────────────────
# Allow-emails — safe git author emails (regex patterns)
# ──────────────────────────────────────────────────────────────────────────────

[allow-emails]
action = "report"
# replace-with = "REDACTED@users.noreply.github.com"  # uncomment when action = "replace"

[[allow-emails.entries]]
email = '123456789\+johndoe@users\.noreply\.github\.com'

[[allow-emails.entries]]
email = "noreply@github\\.com"
