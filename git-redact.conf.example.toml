action = "warn"

[[patterns]]
label = "ZIP code '62701'"
pattern = "62701"
action = "report"

[[patterns]]
label = "Country 'United States'"
pattern = "United States"
action = "warn"

[[patterns]]
label = "Timezone America/New_York"
pattern = "America/New_York"
action = "report"

[[patterns]]
label = "Latitude 40.7"
pattern = "default = 40.7"
