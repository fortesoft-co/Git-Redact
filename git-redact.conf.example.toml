# git-redact configuration
# ========================================
#
# Copy this file to git-redact.conf.toml and customise for your repo.
# Built-in patterns (private keys, API tokens, credentials) are loaded by
# default from git-redact.conf.builtin.toml (use --no-builtin to skip them).
# You don't need to repeat them here. This file is for personal patterns
# specific to you.
#
# OVERRIDING BUILTINS: If a pattern or path in this file has the same
# label as a builtin, your entry replaces the builtin one. For example,
# to change the PKCS12 builtin from warn to report, add:
#
#   [[patterns]]
#   label = "PKCS12 / PFX certificate files"
#   pattern = '\.p12|\.pfx'
#   action = "report"
#
# You must still provide the pattern -- only the label is used for
# matching, but the pattern is required by TOML.
#
# Sections:
#   paths         - File/directory paths to check in git history.
#                   Uses: git log --all --name-only -- <path>
#
#   patterns      - Text/regex patterns to search in full git diff output.
#                   Uses extended regex (same as grep -E).
#                   These are MERGED with the built-in patterns.
#
#   allow-emails  - Git author emails considered safe (regex).
#                   Any commit author email NOT matching one of these
#                   triggers a warning.
#
# Actions (apply to paths and patterns):
#   report   - Find and report, cause exit 1 if found (default)
#   warn     - Find and report, but don't cause exit 1
#   replace  - Find and replace with `replace-with` value (future)
#   remove   - Delete entirely (future, convenience for paths)

# ──────────────────────────────────────────────────────────────────────────────
# Paths — sensitive files and directories that should not be in history
# ──────────────────────────────────────────────────────────────────────────────

[[paths]]
label = "secrets/ directory (should be removed)"
pattern = "secrets/"
action = "report"

[[paths]]
label = ".env files"
pattern = ".env"
action = "report"

[[paths]]
label = ".ssh directory"
pattern = ".ssh/"
action = "report"

[[paths]]
label = "SSH config"
pattern = "ssh_config"
action = "warn"

# ──────────────────────────────────────────────────────────────────────────────
# Patterns — personal identifiers (replace with your own information)
# ──────────────────────────────────────────────────────────────────────────────

# ── Name and identity ───────────────────────────────────────────────────────

[[patterns]]
label = "Username 'johnd'"
pattern = '"johnd"'
action = "report"

[[patterns]]
label = "First name 'John'"
pattern = "John"
action = "warn"

[[patterns]]
label = "Last name 'Doe'"
pattern = "Doe"
action = "warn"

[[patterns]]
label = "Full name 'John Doe'"
pattern = "John Doe"
action = "report"

[[patterns]]
label = "Initials 'J. D.'"
pattern = "J\\. D\\."
action = "warn"

# ── Contact information ─────────────────────────────────────────────────────

[[patterns]]
label = "Email johnd@gmail.com"
pattern = "johnd@gmail.com"
action = "report"

[[patterns]]
label = "Email jdoe@acmecorp.com"
pattern = "jdoe@acmecorp.com"
action = "report"

[[patterns]]
label = "Phone (555) 555-1234"
pattern = "\\(555\\) 555-1234"
action = "report"

[[patterns]]
label = "Phone 555-555-1234"
pattern = "555-555-1234"
action = "report"

[[patterns]]
label = "SSN 000-00-0000"
pattern = "000-00-0000"
action = "report"

[[patterns]]
label = "Credit card 4111-1111-1111-1111"
pattern = '4111[- ]1111[- ]1111[- ]1111'
action = "report"

[[patterns]]
label = "Passport number X12345678"
pattern = "X12345678"
action = "report"

[[patterns]]
label = "Driver license D123-456-78-901"
pattern = "D123-456-78-901"
action = "report"

